<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#22c55e">
  <link rel="manifest" href="manifest.json">
  <title>Dziennik Treningowy Outdoor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
 <div class="install-banner" id="installBanner">
    <span><i class="bi bi-download"></i> Zainstaluj aplikację</span>
    <div>
      <button id="installBtn">Instaluj</button>
      <button class="close-banner" id="closeBanner">&times;</button>
    </div>
  </div>

  <header class="app-header">
    <h1><i class="bi bi-bicycle"></i> Dziennik Treningowy</h1>
    <p>Rejestruj treningi outdoor</p>
  </header>

  <div class="view active" id="viewNew">

    <div class="section-card">
      <h2><i class="bi bi-camera"></i> Zdjęcie z treningu</h2>

      <div id="cameraContainer" style="display:none;position:relative;">
        <video id="cameraVideo" autoplay playsinline style="width:100%;border-radius:12px;background:#000;"></video>
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button class="btn-primary-custom" id="snapBtn" style="flex:1;">
            <i class="bi bi-camera-fill"></i> Zrób zdjęcie
          </button>
          <button class="btn-outline-custom" id="switchCamBtn" style="flex:0 0 50px;padding:10px;">
            <i class="bi bi-arrow-repeat"></i>
          </button>
        </div>
      </div>
      <canvas id="cameraCanvas" style="display:none;"></canvas>

      <img id="photoPreview" alt="Zdjęcie treningu">
      <button class="btn-outline-custom" id="retakeBtn">
        <i class="bi bi-arrow-counterclockwise"></i> Zrób ponownie
      </button>

      <div id="photoPlaceholder">
        <i class="bi bi-camera"></i>
        <span>Dotknij aby uruchomić aparat</span>
      </div>
      <div id="photoButtons" style="display:flex;gap:8px;margin-top:10px;">
        <button class="btn-outline-custom" id="openCameraBtn" style="flex:1;">
          <i class="bi bi-camera-video"></i> Otwórz aparat
        </button>
        <button class="btn-outline-custom" id="galleryBtn" style="flex:1;">
          <i class="bi bi-image"></i> Wybierz z galerii
        </button>
      </div>
      <input type="file" accept="image/*" capture="environment" id="cameraInput" style="display:none">
    </div>

    <div class="section-card">
      <h2><i class="bi bi-lightning"></i> Rodzaj treningu</h2>
      <div class="training-types" id="trainingTypes">
        <button class="training-type-btn" data-type="bieganie"><i class="bi bi-person-walking"></i> Bieganie</button>
        <button class="training-type-btn" data-type="rower"><i class="bi bi-bicycle"></i> Rower</button>
        <button class="training-type-btn" data-type="silownia"><i class="bi bi-heart-pulse"></i> Siłownia</button>
        <button class="training-type-btn" data-type="kalistenika"><i class="bi bi-person-arms-up"></i> Kalistenika</button>
        <button class="training-type-btn" data-type="spacer"><i class="bi bi-tree"></i> Spacer</button>
        <button class="training-type-btn" data-type="inne"><i class="bi bi-three-dots"></i> Inne</button>
      </div>
    </div>

    <div class="section-card">
      <h2><i class="bi bi-geo-alt"></i> Lokalizacja</h2>
      <button class="btn-outline-custom" id="getLocationBtn">
        <i class="bi bi-crosshair"></i> Pobierz lokalizację GPS
      </button>
      <div id="map"></div>
      <div class="location-info" id="locationInfo" style="display:none">
        <i class="bi bi-pin-map"></i> Współrzędne: <span id="coordsText"></span>
      </div>
    </div>

    <div class="section-card">
      <h2><i class="bi bi-pencil"></i> Notatki</h2>
      <textarea class="notes-input" id="trainingNotes" placeholder="Opisz swój trening... (dystans, czas, samopoczucie)"></textarea>
    </div>

    <div style="margin: 16px;">
      <button class="btn-primary-custom" id="saveBtn">
        <i class="bi bi-check-circle"></i> Zapisz trening
      </button>
    </div>

  </div>

  <div class="view" id="viewHistory">
    <div class="section-card">
      <h2><i class="bi bi-clock-history"></i> Historia treningów</h2>
      <div id="historyList">
        <div class="empty-state">
          <i class="bi bi-journal-x"></i>
          <p>Brak zapisanych treningów.<br>Dodaj pierwszy trening!</p>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-view="viewNew">
      <i class="bi bi-plus-circle"></i>
      Nowy
    </button>
    <button class="nav-item" data-view="viewHistory">
      <i class="bi bi-clock-history"></i>
      Historia
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>

</body>
</html>
